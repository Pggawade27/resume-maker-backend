<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} - Resume</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', Georgia, serif; color: #222; line-height: 1.5; max-width: 800px; margin: 0 auto; padding: 40px; }
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-size: 28px; color: #111; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .header hr { border: none; border-top: 2px solid #111; margin: 10px 0; }
  .contact { font-size: 13px; color: #555; text-align: center; }
  .contact span { margin: 0 8px; }
  .section { margin-bottom: 22px; }
  .section-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #111; border-bottom: 1px solid #999; padding-bottom: 4px; margin-bottom: 10px; }
  .section-content { font-size: 14px; color: #333; white-space: pre-wrap; }
  @media print { body { padding: 20px; } }
</style>
</head>
<body>
  <div class="header">
    <h1>{{FULL_NAME}}</h1>
    <hr>
    <div class="contact">
      <span>{{EMAIL}}</span>
      <span>{{PHONE}}</span>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Professional Summary</div>
    <div class="section-content">{{SUMMARY}}</div>
  </div>
  <div class="section">
    <div class="section-title">Professional Experience</div>
    <div class="section-content">{{EXPERIENCE}}</div>
  </div>
  <div class="section">
    <div class="section-title">Education</div>
    <div class="section-content">{{EDUCATION}}</div>
  </div>
  <div class="section">
    <div class="section-title">Core Competencies</div>
    <div class="section-content">{{SKILLS}}</div>
  </div>
</body>
</html>
