<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} - Resume</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 40px; }
  .header { text-align: center; border-bottom: 3px solid #3B82F6; padding-bottom: 20px; margin-bottom: 30px; }
  .header h1 { font-size: 32px; color: #1E293B; letter-spacing: 2px; margin-bottom: 8px; }
  .contact { font-size: 14px; color: #64748B; }
  .contact span { margin: 0 10px; }
  .section { margin-bottom: 24px; }
  .section-title { font-size: 16px; font-weight: 700; color: #3B82F6; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #E2E8F0; padding-bottom: 6px; margin-bottom: 12px; }
  .section-content { font-size: 14px; color: #475569; white-space: pre-wrap; }
  @media print { body { padding: 20px; } }
</style>
</head>
<body>
  <div class="header">
    <h1>{{FULL_NAME}}</h1>
    <div class="contact">
      <span>{{EMAIL}}</span>
      <span>{{PHONE}}</span>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Professional Summary</div>
    <div class="section-content">{{SUMMARY}}</div>
  </div>
  <div class="section">
    <div class="section-title">Experience</div>
    <div class="section-content">{{EXPERIENCE}}</div>
  </div>
  <div class="section">
    <div class="section-title">Education</div>
    <div class="section-content">{{EDUCATION}}</div>
  </div>
  <div class="section">
    <div class="section-title">Skills</div>
    <div class="section-content">{{SKILLS}}</div>
  </div>
</body>
</html>
