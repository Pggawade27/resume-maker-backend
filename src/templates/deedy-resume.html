<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Open Sans', 'Helvetica Neue', sans-serif;
    font-size: 9pt;
    color: #1a202c;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    max-width: 8.27in;
    min-height: 11.69in;
    margin: 0 auto;
    background: #fff;
  }

  /* ─── Big dark header ─── */
  .header {
    background: #111827;
    padding: 30px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 180px;
    height: 100%;
    background: linear-gradient(135deg, transparent 0%, rgba(234,179,8,0.12) 100%);
  }
  .hname {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32pt;
    font-weight: 800;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .hname .accent { color: #eab308; }
  .htag {
    margin-top: 6px;
    font-size: 9pt;
    font-weight: 300;
    color: #9ca3af;
    letter-spacing: 1px;
  }
  .hcontact {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px 20px;
  }
  .hcontact span { font-size: 8pt; color: #6b7280; }
  .hcontact strong { color: #d1d5db; }

  /* ─── Two-column layout ─── */
  .body { display: flex; gap: 0; }

  /* ─── Left column ─── */
  .left {
    width: 240px;
    flex-shrink: 0;
    padding: 22px 20px 22px 40px;
    border-right: 1px solid #f3f4f6;
  }
  .l-section { margin-bottom: 18px; }
  .l-title {
    font-size: 7.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #eab308;
    margin-bottom: 8px;
    padding-bottom: 3px;
    border-bottom: 1.5px solid #fef9c3;
  }
  .l-content {
    font-size: 8.5pt;
    color: #4b5563;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* ─── Right column ─── */
  .right { flex: 1; padding: 22px 40px 22px 24px; }
  .r-section { margin-bottom: 18px; }
  .r-title {
    font-size: 9pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #111827;
    margin-bottom: 8px;
    padding-left: 10px;
    border-left: 3px solid #eab308;
  }
  .r-content {
    font-size: 9pt;
    color: #374151;
    line-height: 1.65;
    white-space: pre-wrap;
  }

  @page { margin: 0; }
  @media print { body { background: #fff; } }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="hname">{{FULL_NAME}}</div>
    <div class="hcontact">
      <span><strong>Email:</strong> {{EMAIL}}</span>
      <span><strong>Phone:</strong> {{PHONE}}</span>
    </div>
  </div>

  <div class="body">
    <div class="left">
      <div class="l-section">
        <div class="l-title">About</div>
        <div class="l-content">{{SUMMARY}}</div>
      </div>
      <div class="l-section">
        <div class="l-title">Skills</div>
        <div class="l-content">{{SKILLS}}</div>
      </div>
      <div class="l-section">
        <div class="l-title">Education</div>
        <div class="l-content">{{EDUCATION}}</div>
      </div>
    </div>

    <div class="right">
      <div class="r-section">
        <div class="r-title">Experience</div>
        <div class="r-content">{{EXPERIENCE}}</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
