<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', 'Arial', sans-serif;
    font-size: 9.5pt;
    color: #1a202c;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    max-width: 8.27in;
    min-height: 11.69in;
    margin: 0 auto;
    padding: 0;
    background: #fff;
  }

  /* ─── Top accent bar ─── */
  .top-bar { height: 6px; background: linear-gradient(90deg, #2563eb, #7c3aed); }

  /* ─── Header ─── */
  .header {
    padding: 30px 44px 22px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-left {}
  .name {
    font-size: 30pt;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }
  .name .first { color: #0f172a; }
  .name .last { color: #2563eb; }
  .tagline {
    margin-top: 4px;
    font-size: 10pt;
    font-weight: 300;
    color: #64748b;
    letter-spacing: 0.5px;
  }
  .header-right { text-align: right; }
  .contact-item {
    font-size: 8.5pt;
    color: #475569;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
  .contact-icon {
    width: 18px;
    height: 18px;
    background: #2563eb;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 7pt;
    flex-shrink: 0;
  }

  /* ─── Body ─── */
  .body { display: flex; }

  /* ─── Left label column ─── */
  .left-col {
    width: 155px;
    flex-shrink: 0;
    padding: 24px 0 24px 44px;
  }
  .section-label {
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #2563eb;
    padding-top: 2px;
  }

  /* ─── Right content ─── */
  .right-col { flex: 1; padding: 24px 40px 24px 0; border-left: 2px solid #dbeafe; }
  .section { display: flex; margin-bottom: 18px; }
  .section-label-wrap { width: 155px; padding: 0 16px 0 44px; flex-shrink: 0; padding-top: 1px; }

  .content-wrap { flex: 1; padding-right: 40px; }
  .section-heading {
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #2563eb;
    margin-bottom: 7px;
  }
  .content {
    font-size: 9.5pt;
    color: #374151;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* Alternate layout */
  .sections-wrap { padding: 20px 40px 28px 44px; }
  .sec { margin-bottom: 20px; }
  .sec-title {
    font-size: 9pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: #2563eb;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1.5px solid #dbeafe;
  }
  .sec-content {
    font-size: 9.5pt;
    color: #374151;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  @page { margin: 0; }
  @media print { body { background: #fff; } }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar"></div>

  <div class="header">
    <div class="header-left">
      <div class="name">
        <span class="first">{{FIRSTNAME}}</span>&nbsp;<span class="last">{{LASTNAME}}</span>
      </div>
    </div>
    <div class="header-right">
      <div class="contact-item">
        <span>{{EMAIL}}</span>
        <span class="contact-icon">✉</span>
      </div>
      <div class="contact-item">
        <span>{{PHONE}}</span>
        <span class="contact-icon">☎</span>
      </div>
    </div>
  </div>

  <div class="sections-wrap">
    <div class="sec">
      <div class="sec-title">Summary</div>
      <div class="sec-content">{{SUMMARY}}</div>
    </div>
    <div class="sec">
      <div class="sec-title">Experience</div>
      <div class="sec-content">{{EXPERIENCE}}</div>
    </div>
    <div class="sec">
      <div class="sec-title">Education</div>
      <div class="sec-content">{{EDUCATION}}</div>
    </div>
    <div class="sec">
      <div class="sec-title">Skills</div>
      <div class="sec-content">{{SKILLS}}</div>
    </div>
  </div>
</div>
</body>
</html>
