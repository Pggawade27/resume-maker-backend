<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
</head>

<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">

                <table width="500" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:8px;padding:40px;box-shadow:0 4px 10px rgba(0,0,0,0.05);">

                    <tr>
                        <td align="center" style="font-size:24px;font-weight:bold;color:#333;">
                            Email Verification
                        </td>
                    </tr>

                    <tr>
                        <td style="padding-top:20px;font-size:16px;color:#555;text-align:center;">
                            Use the following OTP to verify your email address.
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:30px 0;">
                            <div style="font-size:36px;font-weight:bold;letter-spacing:8px;color:#2d7ff9;">
                                {{OTP}}
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td style="font-size:14px;color:#777;text-align:center;">
                            This OTP is valid for <b>5 minutes</b>. Do not share it with anyone.
                        </td>
                    </tr>

                    <tr>
                        <td style="padding-top:30px;font-size:12px;color:#aaa;text-align:center;">
                            If you didn’t request this email, you can safely ignore it.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
